kind = "mobile"
previewPath = "/mobile/"
title = "MyRentCard Leasing Panel"
version = "1.0.0"
id = "artifacts/mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 18115

[services.development]
run = "pnpm --filter @workspace/mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mobile", "run", "serve" ]

[services.env]
PORT = "18115"
BASE_PATH = "/mobile/"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18116

[services.development]
run = "EXPO_PUBLIC_DOMAIN=$REPLIT_DEV_DOMAIN pnpm --filter @workspace/mobile run dev:web"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile", "run", "build:web" ]
run = [ "pnpm", "--filter", "@workspace/mobile", "run", "serve:web" ]

[services.env]
PORT = "18116"
