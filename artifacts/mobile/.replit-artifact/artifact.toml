kind = "mobile"
previewPath = "/"
title = "MyRentCard Leasing Panel"
version = "1.0.0"
id = "artifacts/mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 18115

[services.development]
run = "pnpm --filter @workspace/mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile", "run", "build:web" ]
run = [ "pnpm", "--filter", "@workspace/mobile", "run", "serve:web" ]

[services.env]
PORT = "18115"
